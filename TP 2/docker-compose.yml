services:
  db:
    container_name: db
    restart: unless-stopped
    image: mongo:8.2
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  auth:
    container_name: service_auth
    restart: unless-stopped
    build: ./AuthService
    environment:
      - NODE_ENV=production
      - PORT=4002
      - MONGODB_URI=mongodb://db:27017/auth
      - JWT_SECRET=QWERTYUIOPASDFGHJKLZXCVBNM1234567890abcdefABCDEFGH
      - JWT_EXPIRES_IN=90d
    ports:
      - "5002:4002"
    volumes:
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  produit:
    container_name: service_produits
    restart: unless-stopped
    build: ./ServiceProduit
    environment:
      - MONGODB_URI=mongodb://db:27017/produits
    ports:
      - "5000:4000"
    volumes:
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  commande:
    container_name: service_commandes
    restart: unless-stopped
    build: ./ServiceCommande
    environment:
      - MONGODB_URI=mongodb://db:27017/commandes
      - SERVICE_PRODUIT_URL=http://service_produits:4000
    ports:
      - "5001:4001"
    volumes:
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  data:
